  }

  #canvas { position: fixed; top: 48px; left: 0; right: 0; bottom: 0; }

  .link { stroke-opacity: 0.18; stroke-width: 1; pointer-events: none; }
  .link.family-link { stroke-opacity: 0.35; stroke-width: 1.5; }
  .link.agent-link { stroke-opacity: 0.25; stroke-width: 1; }

  .node.agent circle { stroke: rgba(255,255,255,0.2); stroke-width: 1; }
  .node.tool circle { stroke: none; }

    pointer-events: none;

  .node-label.tool { font-size: 8px; fill: #8b949e; display: none; }

    cursor: pointer;

const COLORS = {
  root:         "#ffffff",
  gobierno:     "#f59e0b",
  produccion:   "#3b82f6",
  supervision:  "#10b981",
  especialistas:"#8b5cf6",
};

const DIMMED  = "rgba(255,255,255,0.04)";
let showToolLabels = false;
let activeNode = null;

// ── Setup ───────────────────────────────────────────────────────────────────
const svg = d3.select("#svg");
const width  = () => window.innerWidth;
const height = () => window.innerHeight - 48;

const g = svg.append("g");

// Zoom
const zoom = d3.zoom()
  .scaleExtent([0.15, 4])
  .on("zoom", (e) => g.attr("transform", e.transform));
svg.call(zoom);

function resetZoom() {
  svg.transition().duration(600)
    .call(zoom.transform, d3.zoomIdentity.translate(width()/2, height()/2).scale(0.8));
}

// ── Force Simulation ────────────────────────────────────────────────────────
const sim = d3.forceSimulation(GRAPH.nodes)
  .force("link", d3.forceLink(GRAPH.links)
    .id(d => d.id)
    .distance(d => {
      const t = d.target;
      const ttype = typeof t === 'object' ? t.type : 'tool';
      if (ttype === 'family') return 160;
      if (ttype === 'agent')  return 110;
      return 55;
    })
    .strength(d => {
      const t = d.target;
      const ttype = typeof t === 'object' ? t.type : 'tool';
      if (ttype === 'family') return 0.9;
      if (ttype === 'agent')  return 0.7;
      return 0.5;
    })
  )
  .force("charge", d3.forceManyBody()
    .strength(d => {
      if (d.type === 'root')   return -800;
      if (d.type === 'family') return -400;
      if (d.type === 'agent')  return -200;
      return -40;
    })
  )
  .force("collision", d3.forceCollide(d => d.size + 4))
  .force("center", d3.forceCenter(0, 0))
  .alphaDecay(0.025);

// ── Links ───────────────────────────────────────────────────────────────────
const linkSel = g.append("g").attr("class","links")
  .selectAll("line")
  .data(GRAPH.links)
  .join("line")
  .attr("class", d => {
    const ttype = typeof d.target === 'object' ? d.target.type : 'tool';
    if (ttype === 'family') return 'link family-link';
    if (ttype === 'agent')  return 'link agent-link';
    return 'link';
  })
  .attr("stroke", d => {
    const src = typeof d.source === 'object' ? d.source : GRAPH.nodes.find(n=>n.id===d.source);
    return COLORS[src?.family] || "#666";
  });

// ── Nodes ───────────────────────────────────────────────────────────────────
const nodeSel = g.append("g").attr("class","nodes")
  .selectAll("g")
  .data(GRAPH.nodes)
  .join("g")
  .attr("class", d => `node ${d.type}`)
  .call(d3.drag()
    .on("start", (e,d) => { if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on("drag",  (e,d) => { d.fx=e.x; d.fy=e.y; })
    .on("end",   (e,d) => { if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
  )
  .on("mouseover", onNodeHover)
  .on("mouseout",  onNodeOut)
  .on("click",     onNodeClick);

// Glow filter
const defs = svg.append("defs");
const filter = defs.append("filter").attr("id","glow");
filter.append("feGaussianBlur").attr("stdDeviation","4").attr("result","coloredBlur");
const feMerge = filter.append("feMerge");
feMerge.append("feMergeNode").attr("in","coloredBlur");
feMerge.append("feMergeNode").attr("in","SourceGraphic");

nodeSel.append("circle")
  .attr("r", d => d.size)
  .attr("fill", d => {
    if (d.type === 'root') return "#1a2233";
    const base = COLORS[d.family] || "#666";
    if (d.type === 'family') return d3.color(base).darker(1.2);
    if (d.type === 'agent')  return d3.color(base).darker(2.2);
    return d3.color(base).darker(3.2);
  })
  .attr("stroke", d => COLORS[d.family] || (d.type === 'root' ? '#fff' : '#666'))
  .attr("stroke-width", d => d.type === 'root' ? 2.5 : d.type === 'family' ? 2 : d.type === 'agent' ? 1.5 : 0)
  .style("filter", d => (d.type === 'root' || d.type === 'family') ? "url(#glow)" : "none");

// Labels
nodeSel.append("text")
  .attr("class", d => `node-label ${d.type}`)
  .attr("dy", d => d.type === 'tool' ? "2.5em" : "0.35em")
  .text(d => {
    if (d.type === 'root') return d.label;
    if (d.type === 'family') return d.label;
    if (d.type === 'agent') {
      // Shorten long names
      const l = d.label;
      if (l.length > 14) return l.split('_').map(w=>w[0]).join('');
      return l;
    }
    return d.label;
  });

// Tool counts on agent nodes
nodeSel.filter(d => d.type === 'agent' && d.toolCount > 0)
  .append("text")
  .attr("dy", "1.6em")
  .attr("text-anchor","middle")
  .attr("font-size","8px")
  .attr("fill","#8b949e")
  .text(d => `(${d.toolCount})`);

// ── Simulation tick ──────────────────────────────────────────────────────────
sim.on("tick", () => {
  linkSel
    .attr("x1", d => d.source.x)
    .attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x)
    .attr("y2", d => d.target.y);
  nodeSel.attr("transform", d => `translate(${d.x},${d.y})`);
});

// Initial zoom after settle
setTimeout(() => {
  svg.transition().duration(800)
    .call(zoom.transform, d3.zoomIdentity.translate(width()/2, height()/2).scale(0.75));
}, 500);

// ── Interactions ─────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

function onNodeHover(e, d) {
  const tt = tooltip;
  let html = `<div class="tt-title">${d.label}</div>`;

  if (d.type === 'root') {
    html += `<div class="tt-meta">Sistema BAGO · Framework v3.0</div>`;
    html += `<div class="tt-desc">Núcleo del sistema. Contiene 4 familias de agentes y 81 herramientas.</div>`;
  } else if (d.type === 'family') {
    const cnt = GRAPH.nodes.filter(n=>n.family===d.family && n.type==='agent').length;
    html += `<div class="tt-meta">FAMILIA · ${cnt} agentes</div>`;
  } else if (d.type === 'agent') {
    html += `<div class="tt-meta">AGENTE · Familia: ${d.family.toUpperCase()}</div>`;
    html += `<div class="tt-meta">${d.toolCount || 0} herramientas asignadas</div>`;
  } else if (d.type === 'tool') {
    html += `<div class="tt-meta">HERRAMIENTA · ${d.agent} · capa: ${d.layer||'—'}</div>`;
    if (d.desc) html += `<div class="tt-desc">${d.desc}</div>`;
    html += `<div class="tt-meta" style="margin-top:6px">$ bago ${d.label}</div>`;
  }

  tt.innerHTML = html;
  tt.style.display = 'block';
  moveTooltip(e);
}

function moveTooltip(e) {
  const tt = tooltip;
  const x = e.clientX + 16;
  const y = e.clientY - 10;
  tt.style.left = (x + tt.offsetWidth > window.innerWidth ? x - tt.offsetWidth - 32 : x) + 'px';
  tt.style.top  = (y + tt.offsetHeight > window.innerHeight ? y - tt.offsetHeight : y) + 'px';
}

svg.on("mousemove", moveTooltip);

function onNodeOut() {
  tooltip.style.display = 'none';
}

function onNodeClick(e, d) {
  e.stopPropagation();
  activeNode = d;

  const panel = document.getElementById('info');
  let html = `<div style="display:flex;justify-content:space-between;align-items:center">
    <h3>${d.label}</h3>
    <span class="close-btn" onclick="closeInfo()">✕</span>
  </div>`;

  if (d.type === 'root') {
    const agentCnt = GRAPH.nodes.filter(n=>n.type==='agent').length;
    const toolCnt  = GRAPH.nodes.filter(n=>n.type==='tool').length;
    html += `<div class="info-row"><span>Versión</span><span class="info-val">2.6-taxonomy</span></div>`;
    html += `<div class="info-row"><span>Agentes</span><span class="info-val">${agentCnt}</span></div>`;
    html += `<div class="info-row"><span>Herramientas</span><span class="info-val">${toolCnt}</span></div>`;
    html += `<div class="info-row"><span>Familias</span><span class="info-val">4</span></div>`;
  } else if (d.type === 'family') {
    const agents = GRAPH.nodes.filter(n=>n.family===d.family && n.type==='agent');
    const tools  = GRAPH.nodes.filter(n=>n.family===d.family && n.type==='tool');
    html += `<div class="info-row"><span>Familia</span><span class="info-val">${d.family}</span></div>`;
    html += `<div class="info-row"><span>Agentes</span><span class="info-val">${agents.length}</span></div>`;
    html += `<div class="info-row"><span>Herramientas</span><span class="info-val">${tools.length}</span></div>`;
  } else if (d.type === 'agent') {
    const tools = GRAPH.nodes.filter(n=>n.type==='tool' && n.agent===d.label);
    html += `<div class="info-row"><span>Familia</span><span class="info-val">${d.family}</span></div>`;
    html += `<div class="info-row"><span>Herramientas</span><span class="info-val">${tools.length}</span></div>`;
    if (tools.length > 0) {
      html += `<div style="margin-top:8px;font-size:10px;color:#8b949e;margin-bottom:4px">HERRAMIENTAS</div>`;
      html += `<div class="tool-chips">`;
      tools.forEach(t => {
        html += `<span class="chip">${t.label}</span>`;
      });
      html += '</div>';
    }
  } else if (d.type === 'tool') {
    html += `<div class="info-row"><span>Agente</span><span class="info-val">${d.agent}</span></div>`;
    html += `<div class="info-row"><span>Capa</span><span class="info-val">${d.layer||'—'}</span></div>`;
    html += `<div class="info-row"><span>Familia</span><span class="info-val">${d.family}</span></div>`;
    if (d.desc) html += `<div style="margin-top:8px;font-size:10px;color:#c9d1d9;border-top:1px solid #21262d;padding-top:8px">${d.desc}</div>`;
    html += `<div style="margin-top:8px;font-size:10px;color:#484f58;font-family:monospace">$ bago ${d.label}</div>`;
  }

  panel.innerHTML = html;
  panel.style.display = 'block';

  // Highlight connected nodes
  highlightNode(d);
}

function highlightNode(d) {
  const connected = new Set([d.id]);
  GRAPH.links.forEach(l => {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    if (sid === d.id) connected.add(tid);
    if (tid === d.id) connected.add(sid);
  });

  nodeSel.selectAll("circle")
    .style("opacity", (nd) => connected.has(nd.id) ? 1 : 0.15);
  linkSel
    .style("opacity", (l) => {
      const sid = typeof l.source === 'object' ? l.source.id : l.source;
      const tid = typeof l.target === 'object' ? l.target.id : l.target;
      return (connected.has(sid) && connected.has(tid)) ? 0.6 : 0.05;
    });
  nodeSel.selectAll("text")
    .style("opacity", (nd) => connected.has(nd.id) ? 1 : 0.1);
}

function closeInfo() {
  document.getElementById('info').style.display = 'none';
  activeNode = null;
  // Restore all
  nodeSel.selectAll("circle").style("opacity", 1);
  linkSel.style("opacity", null);
  nodeSel.selectAll("text").style("opacity", 1);
}

svg.on("click", (e) => {
  if (e.target === document.querySelector("#svg") || e.target.closest(".links")) closeInfo();
});

function toggleLabels() {
  showToolLabels = !showToolLabels;
  d3.selectAll(".node-label.tool").style("display", showToolLabels ? "block" : "none");
}

window.resetZoom = resetZoom;
window.toggleLabels = toggleLabels;
window.closeInfo = closeInfo;
</script>
</body>
</html>
