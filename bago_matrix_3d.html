<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#060a10; overflow:hidden; font-family:"SF Mono","Fira Code",monospace; color:#e6edf3; }
#hdr {

}
.lbtn {

.lbtn:hover { color:#c9d1d9; background:#1a2030; }

#tt {

}
#panel {
  position:fixed; top:54px; right:18px; z-index:10; width:224px;

}

.px { cursor:pointer; color:#8b949e; font-size:15px; }
.pr { display:flex; justify-content:space-between; font-size:10px; margin-bottom:4px; }
.pr span:first-child { color:#8b949e; }
.pr span:last-child { color:#e6edf3; font-weight:600; }
.chips { display:flex; flex-wrap:wrap; gap:3px; margin-top:8px; }
.chip { font-size:8px; padding:2px 5px; border-radius:3px; background:#1a2030; color:#8b949e; }
.pdesc { font-size:10px; color:#c9d1d9; margin-top:8px; line-height:1.5; border-top:1px solid #1a2030; padding-top:8px; }
.pcmd { font-size:9px; color:#3a4458; margin-top:7px; }
#leg {
  position:fixed; bottom:18px; left:18px; z-index:10;
  background:rgba(10,15,25,0.88); border:1px solid #1a2030;
  border-radius:8px; padding:11px 14px; font-size:10px; backdrop-filter:blur(10px);

.li { display:flex; align-items:center; gap:7px; margin-bottom:4px; color:#c9d1d9; }
.ld { width:8px; height:8px; border-radius:50%; }
#ctrl { position:fixed; bottom:18px; right:18px; z-index:10; display:flex; gap:7px; }
.btn {
  background:rgba(10,15,25,0.9); border:1px solid #2a3448; color:#e6edf3;

.btn:hover { background:#1a2030; }
.btn.on { border-color:#3b82f6; color:#60a5fa; }

function makeSprite(text, color, fs) {
  const W=512,H=80,c=document.createElement('canvas');
  c.width=W; c.height=H;
  const ctx=c.getContext('2d');
  ctx.clearRect(0,0,W,H);
  ctx.shadowColor=color; ctx.shadowBlur=14;
  ctx.font=`bold ${fs}px "SF Mono",monospace`;
  ctx.fillStyle=color; ctx.textAlign='center';
  ctx.fillText(text,W/2,H*0.68);
  const tex=new THREE.CanvasTexture(c);
  const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false});
  const sp=new THREE.Sprite(mat);
  const h=fs>=28?14:fs>=20?9:6;
  sp.scale.set(h*(W/H)*0.5,h,1);
  sp.userData.isLabel=true;
  return sp;
}

  .linkDirectionalParticleSpeed(0.007)
  .linkDirectionalParticleColor(l=>l.col||'#fff')
  .onNodeClick(onNodeClick)
  .onNodeHover(onNodeHover)
  .onBackgroundClick(closePanel);

setTimeout(()=>{
  const sc=G.scene();
  sc.add(new THREE.AmbientLight(0x1a2a4a,3));
  const d1=new THREE.DirectionalLight(0xffffff,1.4); d1.position.set(400,300,400); sc.add(d1);
  const d2=new THREE.DirectionalLight(0x334477,0.9); d2.position.set(-300,-200,-300); sc.add(d2);
  [[0xf59e0b,300,80,0],[0x3b82f6,-280,0,200],[0x10b981,0,-180,-280],[0x8b5cf6,200,-100,300]]
    .forEach(([col,x,y,z])=>{ const pl=new THREE.PointLight(col,0.9,700); pl.position.set(x,y,z); sc.add(pl); });
},60);

setTimeout(()=>{
  G.d3Force('link')
    ?.distance(l=>l.ltype==='root'?180:l.ltype==='family'?130:65)
    ?.strength(l=>l.ltype==='root'?0.9:l.ltype==='family'?0.7:0.45);
  G.d3Force('charge')?.strength(n=>
    n.type==='root'?-2200:n.type==='family'?-900:n.type==='agent'?-400:-80
  );
  G.d3ReheatSimulation();
},100);

G.cameraPosition({x:320,y:200,z:540},{x:0,y:0,z:0});

// ── Layouts ───────────────────────────────────────────────────────────────────
let animating=false, animProg=0, animStart={}, animEnd={};
function ease(t){ return t<0.5?2*t*t:-1+(4-2*t)*t; }

function fibSphere(n,r){
  const pts=[],phi=Math.PI*(3-Math.sqrt(5));
  for(let i=0;i<n;i++){
    const y=1-(i/Math.max(n-1,1))*2, rad=Math.sqrt(1-y*y), th=phi*i;
    pts.push({x:Math.cos(th)*rad*r,y:y*r,z:Math.sin(th)*rad*r});
  }
  return pts;
}

function startAnim(targetPos){
  animStart={};
  DATA.nodes.forEach(n=>{ animStart[n.id]={x:n.x||0,y:n.y||0,z:n.z||0}; });
  animEnd=targetPos; animProg=0; animating=true;
}

const LAYOUTS = {
  force:{
    label:'FUERZA LIBRE',
    apply(){
      DATA.nodes.forEach(n=>{n.fx=null;n.fy=null;n.fz=null;});
      G.d3Force('charge')?.strength(n=>n.type==='root'?-2200:n.type==='family'?-900:n.type==='agent'?-400:-80);
      G.d3Force('link')?.distance(l=>l.ltype==='root'?180:l.ltype==='family'?130:65).strength(l=>l.ltype==='root'?0.9:l.ltype==='family'?0.7:0.45);
      G.d3ReheatSimulation();
    }
  },
  radial:{
    label:'CONCÉNTRICO',
    apply(){
      const pos={};
      pos['bago']={x:0,y:0,z:0};
      const fams=FAM_ORDER;
      const famPts=fibSphere(4,160);
      fams.forEach((fam,fi)=>{
        pos[`fam_${fam}`]=famPts[fi];
        const agents=DATA.nodes.filter(n=>n.type==='agent'&&n.family===fam);
        const aPts=fibSphere(agents.length,85);
        agents.forEach((a,ai)=>{
          const fp=famPts[fi];
          pos[a.id]={x:fp.x+aPts[ai].x,y:fp.y+aPts[ai].y,z:fp.z+aPts[ai].z};
          const tools=DATA.nodes.filter(n=>n.type==='tool'&&n.agent===a.label);
          const tPts=fibSphere(tools.length,52);
          tools.forEach((t,ti)=>{
            pos[t.id]={x:pos[a.id].x+tPts[ti].x,y:pos[a.id].y+tPts[ti].y,z:pos[a.id].z+tPts[ti].z};
          });
        });
      });
      G.d3Force('charge')?.strength(0); G.d3Force('link')?.strength(0);
      startAnim(pos);
    }
  },
  cluster:{
    label:'POR FAMILIA',
    apply(){
      const CENT=[{x:290,y:130,z:0},{x:-290,y:130,z:0},{x:0,y:-190,z:290},{x:0,y:-190,z:-290}];
      const pos={};
      pos['bago']={x:0,y:0,z:0};
      FAM_ORDER.forEach((fam,fi)=>{
        const c=CENT[fi];
        pos[`fam_${fam}`]=c;
        const agents=DATA.nodes.filter(n=>n.type==='agent'&&n.family===fam);
        const aPts=fibSphere(agents.length,80);
        agents.forEach((a,ai)=>{
          const ap={x:c.x+aPts[ai].x,y:c.y+aPts[ai].y,z:c.z+aPts[ai].z};
          pos[a.id]=ap;
          const tools=DATA.nodes.filter(n=>n.type==='tool'&&n.agent===a.label);
          const tPts=fibSphere(tools.length,46);
          tools.forEach((t,ti)=>{ pos[t.id]={x:ap.x+tPts[ti].x,y:ap.y+tPts[ti].y,z:ap.z+tPts[ti].z}; });
        });
      });
      G.d3Force('charge')?.strength(0); G.d3Force('link')?.strength(0);
      startAnim(pos);
    }
  },
  layer:{
    label:'POR CAPA',
    apply(){
      const pos={};
      pos['bago']={x:0,y:340,z:0};
      FAM_ORDER.forEach((fam,fi)=>{
        const a=(fi/4)*Math.PI*2;
        pos[`fam_${fam}`]={x:Math.cos(a)*90,y:280,z:Math.sin(a)*90};
      });
      DATA.nodes.filter(n=>n.type==='agent').forEach((ag,ai)=>{
        const fi=FAM_ORDER.indexOf(ag.family);
        const a=(fi/4)*Math.PI*2+ai*0.35;
        const r=170;
        pos[ag.id]={x:Math.cos(a)*r,y:190,z:Math.sin(a)*r};
        const tools=DATA.nodes.filter(n=>n.type==='tool'&&n.agent===ag.label);
        tools.forEach((t,ti)=>{
          const ly=LAYER_Y[t.layer]??-220;
          const ta=a+(ti-tools.length/2)*0.2;
          const tr=90+ti*7;
          pos[t.id]={x:Math.cos(ta)*tr,y:ly,z:Math.sin(ta)*tr};
        });
      });
      G.d3Force('charge')?.strength(0); G.d3Force('link')?.strength(0);
      startAnim(pos);
    }
  },
  ring:{
    label:'ANILLO DE AGENTES',
    apply(){
      const pos={};
      pos['bago']={x:0,y:0,z:0};
      const agents=DATA.nodes.filter(n=>n.type==='agent');
      FAM_ORDER.forEach((fam,fi)=>{
        const a=(fi/4)*Math.PI*2+Math.PI/4;
        pos[`fam_${fam}`]={x:Math.cos(a)*120,y:Math.sin(fi)*30,z:Math.sin(a)*120};
      });
      agents.forEach((ag,ai)=>{
        const a=(ai/agents.length)*Math.PI*2;
        const R=260;
        const ap={x:Math.cos(a)*R,y:Math.sin(ai*1.1)*50,z:Math.sin(a)*R};
        pos[ag.id]=ap;
        const tools=DATA.nodes.filter(n=>n.type==='tool'&&n.agent===ag.label);
        tools.forEach((t,ti)=>{
          const ta=a+(ti-tools.length/2)*(Math.PI*1.3/Math.max(tools.length,1));
          pos[t.id]={x:ap.x+Math.cos(ta)*68,y:ap.y+Math.sin(ta*2)*28,z:ap.z+Math.sin(ta)*68};
        });
      });
      G.d3Force('charge')?.strength(0); G.d3Force('link')?.strength(0);
      startAnim(pos);
    }
  },
};

function setLayout(name, btn){
  document.querySelectorAll('.lbtn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.getElementById('layoutLabel').textContent=LAYOUTS[name]?.label||name;
  LAYOUTS[name]?.apply();
}

// ── Main loop ─────────────────────────────────────────────────────────────────
let rotating=true, orbitAngle=0;
(function loop(){
  requestAnimationFrame(loop);
  if(animating){
    animProg=Math.min(1,animProg+0.022);
    const t=ease(animProg);
    DATA.nodes.forEach(n=>{
      const s=animStart[n.id]||{x:0,y:0,z:0};
      const e=animEnd[n.id]; if(!e) return;
      n.fx=s.x+(e.x-s.x)*t; n.fy=s.y+(e.y-s.y)*t; n.fz=s.z+(e.z-s.z)*t;
    });
    if(animProg>=1) animating=false;
  }
  if(rotating){
    orbitAngle+=0.004;
    const R=680,tilt=0.28;
    G.cameraPosition({
      x:R*Math.sin(orbitAngle),
      y:R*Math.sin(tilt)*Math.cos(orbitAngle*0.4),
      z:R*Math.cos(orbitAngle),
    });
  }
  const cam=G.cameraPosition();
  DATA.nodes.forEach(n=>{
    if(!n.__threeObj) return;
    const dist=Math.hypot((n.x||0)-cam.x,(n.y||0)-cam.y,(n.z||0)-cam.z);
    n.__threeObj.traverse(c=>{
      if(c.userData?.isLabel) c.visible=dist<(LABEL_THRESH[n.type]??150);
    });
  });
})();

function toggleRot(){ rotating=!rotating; document.getElementById('bRot').classList.toggle('on',rotating); }
function resetCam(){
  rotating=true; orbitAngle=0;
  document.getElementById('bRot').classList.add('on');
  G.cameraPosition({x:320,y:200,z:540},{x:0,y:0,z:0},800);
}

// ── Tooltip ───────────────────────────────────────────────────────────────────
const tt=document.getElementById('tt');
document.addEventListener('mousemove',e=>{
  if(tt.style.display==='none') return;
  const x=e.clientX+16,y=e.clientY-8;
  tt.style.left=(x+tt.offsetWidth>window.innerWidth?x-tt.offsetWidth-32:x)+'px';
  tt.style.top=(y+tt.offsetHeight>window.innerHeight?y-tt.offsetHeight:y)+'px';
});
function onNodeHover(node){
  if(!node){ tt.style.display='none'; return; }
  const col=node.col||'#fff';
  let h=`<div style="font-weight:700;font-size:12px;margin-bottom:3px;color:${col}">${node.label}</div>`;
  if(node.type==='root') h+=`<span style="font-size:9px;color:#8b949e">Sistema · 4 familias · 14 agentes · 81 herramientas</span>`;
  else if(node.type==='family'){
    const cnt=DATA.nodes.filter(n=>n.type==='agent'&&n.family===node.family).length;
    h+=`<span style="font-size:9px;color:#8b949e">FAMILIA · ${cnt} agentes</span>`;
  }
  else if(node.type==='agent') h+=`<span style="font-size:9px;color:#8b949e">AGENTE · ${node.family} · ${node.toolCount||0} tools</span>`;
  else{
    h+=`<span style="font-size:9px;color:#8b949e">${node.agent} · ${node.layer||'—'}</span>`;
    if(node.desc) h+=`<div style="font-size:10px;color:#c9d1d9;margin-top:5px;border-top:1px solid #1a2030;padding-top:5px">${node.desc}</div>`;
    h+=`<div style="font-size:9px;color:#3a4458;margin-top:4px">$ bago ${node.label}</div>`;
  }
  tt.innerHTML=h; tt.style.display='block';
}

// ── Panel ─────────────────────────────────────────────────────────────────────
function onNodeClick(node){
  const p=document.getElementById('panel'),col=node.col||'#fff';
  let h=`<h3 style="color:${col}">${node.label}<span class="px" onclick="closePanel()">✕</span></h3>`;
  if(node.type==='root') h+=pr('Versión','2.6-taxonomy')+pr('Familias','4')+pr('Agentes','14')+pr('Herramientas','81');
  else if(node.type==='family'){
    const ag=DATA.nodes.filter(n=>n.type==='agent'&&n.family===node.family);
    const tl=DATA.nodes.filter(n=>n.type==='tool'&&n.family===node.family);
    h+=pr('Agentes',ag.length)+pr('Herramientas',tl.length);
  }
  else if(node.type==='agent'){
    const tools=DATA.nodes.filter(n=>n.type==='tool'&&n.agent===node.label);
    h+=pr('Familia',node.family)+pr('Herramientas',tools.length);
    if(tools.length) h+=`<div class="chips">`+tools.map(t=>`<span class="chip">${t.label}</span>`).join('')+`</div>`;
  }else{
    h+=pr('Agente',node.agent)+pr('Capa',node.layer||'—')+pr('Familia',node.family);
    if(node.desc) h+=`<div class="pdesc">${node.desc}</div>`;
    h+=`<div class="pcmd">$ bago ${node.label}</div>`;
  }
  p.innerHTML=h; p.style.display='block';
  rotating=false; document.getElementById('bRot').classList.remove('on');
  const ratio=1+160/Math.hypot(node.x||1,node.y||1,node.z||1);
  G.cameraPosition({x:(node.x||0)*ratio,y:(node.y||0)*ratio+30,z:(node.z||0)*ratio},node,900);
}
function pr(k,v){return `<div class="pr"><span>${k}</span><span>${v}</span></div>`;}
function closePanel(){document.getElementById('panel').style.display='none';}
window.setLayout=setLayout; window.toggleRot=toggleRot; window.resetCam=resetCam; window.closePanel=closePanel;
</script>
</body>
