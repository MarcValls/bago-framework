<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BAGO</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg:      #0c0c0c;
  --surface: #141414;
  --card:    #1c1c1c;
  --border:  #2a2a2a;
  --accent:  #00d4aa;
  --accent2: #0099ff;
  --text:    #e8e8e8;
  --muted:   #777;
  --ok:      #22c55e;
  --warn:    #f59e0b;
  --err:     #ef4444;
  --user-bubble: #00d4aa;
  --bago-bubble: #1e1e1e;
  --tab-h:   56px;
  --header-h:52px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px;
  display: flex;
  flex-direction: column;
}
.header {
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 10px;
  flex-shrink: 0;
}
.header-logo {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 900; color: #000;
  flex-shrink: 0;
}
.header-title { font-size: 17px; font-weight: 700; color: var(--accent); }
.header-sub   { font-size: 10px; color: var(--muted); }
.header-status {
  margin-left: auto;
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--muted);
}
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); }
.dot.warn { background: var(--warn); }
.tabs {
  height: var(--tab-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  flex-shrink: 0;
  order: 99;
}
.tab {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px;
  cursor: pointer;
  color: var(--muted);
  font-size: 10px;
  transition: color .2s;
  border: none; background: none;
  padding: 0;
}
.tab .icon { font-size: 20px; }
.tab.active { color: var(--accent); }
.content {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.panel {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  overflow: hidden;
}
.panel.active { display: flex; }
.scroll {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  -webkit-overflow-scrolling: touch;
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 10px;
}
.card-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
  margin-bottom: 10px;
}
.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
}
.stat-row:last-child { border-bottom: none; }
.stat-label { color: var(--muted); font-size: 12px; }
.stat-val   { font-weight: 600; font-size: 13px; }
.badge { padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-ok   { background: #052; color: var(--ok); }
.badge-warn { background: #320; color: var(--warn); }
.quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.qbtn {
  padding: 12px 8px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  text-align: center;
  transition: background .15s;
}
.qbtn:active { background: var(--border); }
.qbtn .qicon { font-size: 22px; display: block; margin-bottom: 4px; }
/* CMD Panel */
.cmd-section { padding: 10px 12px 4px; flex-shrink: 0; }
.cmd-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 6px; }
.cmd-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 6px; }
.cmd-btn {
  padding: 10px 4px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--card); color: var(--text);
  font-size: 11px; cursor: pointer; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  transition: all .15s; font-family: inherit;
}
.cmd-btn:active { background: var(--accent); color: #000; border-color: var(--accent); }
.cmd-btn.running { border-color: var(--accent); color: var(--accent); animation: pulse 1s infinite; }
.cmd-btn.hero { background: rgba(0,212,170,.12); border-color: var(--accent); color: var(--accent); }
.cmd-btn .ci { font-size: 20px; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.term-header {
  padding: 6px 12px; background: #0f0f0f;
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
  font-family: monospace; font-size: 11px; color: var(--muted);
  flex-shrink: 0;
}
.term-out {
  flex: 1; overflow-y: auto; padding: 10px 12px;
  font-family: 'Menlo', 'Courier New', monospace; font-size: 12px; line-height: 1.6;
  background: #070707; white-space: pre-wrap; word-break: break-word; color: #c9c9c9;
  -webkit-overflow-scrolling: touch;
}
.t-cmd  { color: var(--accent); font-weight: 700; }
.t-ok   { color: var(--ok); }
.t-err  { color: var(--err); }
.t-warn { color: var(--warn); }
.t-dim  { color: var(--muted); }
.cmd-input-bar {
  padding: 8px 10px; border-top: 1px solid var(--border); background: var(--surface);
  display: flex; gap: 6px; align-items: center; flex-shrink: 0;
}
.cmd-prompt { color: var(--accent); font-family: monospace; font-size: 15px; font-weight: 700; flex-shrink: 0; }
.cmd-input-bar input {
  flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 13px; font-family: monospace; padding: 7px 10px; outline: none;
}
.cmd-input-bar input:focus { border-color: var(--accent); }
.cmd-run-btn { padding: 7px 14px; border-radius: 8px; background: var(--accent); border: none; color: #000; font-weight: 700; cursor: pointer; font-size: 14px; }
/* TAREAS */
.tarea-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.tarea-item:last-child { border-bottom: none; }
.tarea-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .2s; }
.tarea-check:hover { border-color: var(--ok); }
.tarea-check.done { background: var(--ok); border-color: var(--ok); }
.tarea-body { flex: 1; min-width: 0; }
.tarea-titulo { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tarea-meta { font-size: 10px; color: var(--muted); margin-top: 2px; }
.tarea-del { color: var(--muted); font-size: 16px; cursor: pointer; padding: 4px; flex-shrink: 0; }
.tarea-del:active { color: var(--err); }
.proj-tag { display: inline-block; padding: 1px 6px; background: rgba(0,212,170,.15); color: var(--accent); border-radius: 4px; font-size: 10px; font-weight: 600; margin-right: 4px; }
.add-tarea-bar { padding: 10px 12px; border-top: 1px solid var(--border); background: var(--surface); display: flex; gap: 8px; flex-shrink: 0; }
.add-tarea-bar input { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; padding: 8px 12px; outline: none; }
.add-tarea-bar input:focus { border-color: var(--accent); }
.add-tarea-bar button { padding: 8px 14px; border-radius: 8px; background: var(--accent); border: none; color: #000; font-weight: 700; cursor: pointer; font-size: 16px; }
/* GIT */
.git-log-line { font-family: monospace; font-size: 12px; padding: 5px 0; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: baseline; }
.git-log-line:last-child { border-bottom: none; }
.git-hash { color: var(--accent); flex-shrink: 0; }
.git-msg  { color: var(--text); flex: 1; }
.git-status-line { font-family: monospace; font-size: 12px; padding: 4px 0; border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
.git-status-line:last-child { border-bottom: none; }
.git-mod { color: var(--warn); } .git-add { color: var(--ok); } .git-del { color: var(--err); }
/* Toast */
#toast { position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 7px 18px; border-radius: 20px; font-weight: 600; font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; white-space: nowrap; }
</style>
</head>
<body>
<div class="header">
  <div class="header-logo">B</div>
  <div>
    <div class="header-title">BAGO</div>
    <div class="header-sub">@bago_amtec_bot · v2</div>
  </div>
  <div class="header-status">
    <div class="dot" id="status-dot"></div>
    <span id="status-txt">—</span>
  </div>
</div>

<div class="content">
  <!-- DASHBOARD -->
  <div class="panel active" id="panel-dash">
    <div class="scroll" id="dash-scroll">
      <div class="card"><div style="text-align:center;color:var(--muted);padding:20px">Cargando...</div></div>
    </div>
  </div>
  <!-- CMD -->
  <div class="panel" id="panel-cmd">
    <div class="cmd-section">
      <div class="cmd-section-title">BAGO Core</div>
      <div class="cmd-grid">
        <button class="cmd-btn hero" id="btn-start"   onclick="runCmd('start')">  <span class="ci">🚀</span><span>START</span></button>
        <button class="cmd-btn"      id="btn-health"  onclick="runCmd('health')"> <span class="ci">💚</span><span>Health</span></button>
        <button class="cmd-btn"      id="btn-ideas"   onclick="runCmd('ideas')">  <span class="ci">💡</span><span>Ideas</span></button>
        <button class="cmd-btn"      id="btn-next"    onclick="runCmd('next')">   <span class="ci">⏭️</span><span>Next</span></button>
      </div>
      <div class="cmd-grid">
        <button class="cmd-btn"      id="btn-doctor"  onclick="runCmd('doctor')"> <span class="ci">🩺</span><span>Doctor</span></button>
        <button class="cmd-btn"      id="btn-reparar" onclick="runCmd('reparar')"><span class="ci">🔧</span><span>Reparar</span></button>
        <button class="cmd-btn"      id="btn-cosecha" onclick="runCmd('cosecha')"><span class="ci">🌾</span><span>Cosecha</span></button>
        <button class="cmd-btn"      id="btn-commit"  onclick="runCmd('commit')"> <span class="ci">📦</span><span>Commit</span></button>
      </div>
    </div>
    <div class="term-header">
      <span id="term-dot" style="color:var(--muted)">●</span>
      <span id="term-title" style="flex:1">listo</span>
      <button onclick="clearTerm()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:0 4px">✕ clear</button>
    </div>
    <div class="term-out" id="term-out"><span class="t-dim">Pulsa un comando para ejecutarlo...\n</span></div>
    <div class="cmd-input-bar">
      <span class="cmd-prompt">$</span>
      <input id="cmd-input" type="text" placeholder="health · ideas · next · doctor · cosecha ..."
        onkeydown="if(event.key==='Enter')runCustomCmd()">
      <button class="cmd-run-btn" onclick="runCustomCmd()">▶</button>
    </div>
  </div>
  <!-- TAREAS -->
  <div class="panel" id="panel-tareas">
    <div class="scroll" id="tareas-list">
      <div class="card"><div style="text-align:center;color:var(--muted);padding:20px">Cargando...</div></div>
    </div>
    <div class="add-tarea-bar">
      <input id="tarea-input" type="text" placeholder="PROYECTO: descripción tarea"
        onkeydown="if(event.key==='Enter')addTarea()"/>
      <button onclick="addTarea()">+</button>
    </div>
  </div>
  <!-- GIT -->
  <div class="panel" id="panel-git">
    <div class="scroll" id="git-content">
      <div class="card"><div style="text-align:center;color:var(--muted);padding:20px">Cargando git...</div></div>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('dash')" id="tab-dash">
    <span class="icon">📊</span><span>Dashboard</span>
  </button>
  <button class="tab" onclick="switchTab('cmd')" id="tab-cmd">
    <span class="icon">⚡</span><span>CMD</span>
  </button>
  <button class="tab" onclick="switchTab('tareas')" id="tab-tareas">
    <span class="icon">📋</span><span>Tareas</span>
  </button>
  <button class="tab" onclick="switchTab('git')" id="tab-git">
    <span class="icon">🌿</span><span>Git</span>
  </button>
</div>

<div id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

let currentTab  = 'dash';
let tareasData  = [];
let cmdRunning  = false;

function switchTab(tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  currentTab = tab;
  if (tab === 'dash')   loadDash();
  if (tab === 'tareas') loadTareas();
  if (tab === 'git')    loadGit();
}

function toast(msg, ms=2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', ms);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function md(text) {
  return esc(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
}

function now() {
  return new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
}

/* ── DASHBOARD ── */
async function loadDash() {
  try {
    const s = await fetch('/api/state').then(r=>r.json());
    const h = s.system_health || 'ok';
    const isOk = ['ok','healthy'].includes(h);
    document.getElementById('status-dot').className = 'dot' + (isOk ? '' : ' warn');
    document.getElementById('status-txt').textContent = h;

    const wf  = s.sprint_status?.active_workflow || {};
    const tg_ = s.telegram_bot || {};
    const inv = s.inventory || {};
    const notes = (s.notes||'').split('\n').filter(Boolean).reverse().slice(0,5);
    const pending = tareasData.filter(t=>t.status==='pendiente').length;

    document.getElementById('dash-scroll').innerHTML = `
      <div class="card">
        <div class="card-title">Sistema</div>
        <div class="stat-row"><span class="stat-label">Health</span><span class="badge badge-${isOk?'ok':'warn'}">${esc(h)}</span></div>
        <div class="stat-row"><span class="stat-label">Versión</span><span class="stat-val">v${esc(s.bago_version||'?')}</span></div>
        <div class="stat-row"><span class="stat-label">Bot</span><span class="stat-val">${esc(tg_.username||'@bago_amtec_bot')} ✅</span></div>
        <div class="stat-row"><span class="stat-label">Commits</span><span class="stat-val">${esc(inv.commits||'?')}</span></div>
      </div>
      <div class="card">
        <div class="card-title">Sprint activo</div>
        <div class="stat-row"><span class="stat-label">Workflow</span><span class="stat-val"><code>${esc(wf.code||'—')}</code></span></div>
        <div class="stat-row"><span class="stat-label">Título</span><span class="stat-val" style="font-size:11px;text-align:right;max-width:60%">${esc(wf.title||'—')}</span></div>
      </div>
      <div class="card">
        <div class="card-title">Acciones rápidas</div>
        <div class="quick-grid">
          <div class="qbtn" onclick="switchTab('cmd');runCmd('health')"><span class="qicon">💚</span>Health</div>
          <div class="qbtn" onclick="switchTab('tareas')"><span class="qicon">📋</span>Tareas (${pending})</div>
          <div class="qbtn" onclick="switchTab('git')"><span class="qicon">🌿</span>Git</div>
          <div class="qbtn" onclick="switchTab('cmd')"><span class="qicon">⚡</span>CMD</div>
        </div>
      </div>
      ${notes.length ? `<div class="card"><div class="card-title">Notas recientes</div>${notes.map(n=>`<div class="stat-row"><span style="font-size:12px;color:var(--muted)">${esc(n.slice(0,80))}</span></div>`).join('')}</div>` : ''}
    `;
  } catch(e) {
    document.getElementById('dash-scroll').innerHTML = `<div class="card"><div style="color:var(--err)">Error cargando estado</div></div>`;
  }
}

/* ── CMD ── */
function termAppend(html) {
  const el = document.getElementById('term-out');
  el.innerHTML += html;
  el.scrollTop = el.scrollHeight;
}

function termSet(html) {
  const el = document.getElementById('term-out');
  el.innerHTML = html;
  el.scrollTop = el.scrollHeight;
}

function clearTerm() {
  termSet('<span class="t-dim">Terminal limpiada.\n</span>');
  document.getElementById('term-title').textContent = 'listo';
  document.getElementById('term-dot').style.color = 'var(--muted)';
}

function colorizeOutput(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(✅[^\n]*)/g,  '<span class="t-ok">$1</span>')
    .replace(/(❌[^\n]*)/g,  '<span class="t-err">$1</span>')
    .replace(/(⚠[^\n]*)/g,  '<span class="t-warn">$1</span>')
    .replace(/(🟢[^\n]*)/g,  '<span class="t-ok">$1</span>')
    .replace(/(🔴[^\n]*)/g,  '<span class="t-err">$1</span>')
    .replace(/(🟡[^\n]*)/g,  '<span class="t-warn">$1</span>')
    .replace(/(KO[^\n]*)/g,  '<span class="t-err">$1</span>')
    .replace(/(GO[^\n]*)/g,  '<span class="t-ok">$1</span>')
    .replace(/(={3,}[^\n]*)/g,'<span class="t-dim">$1</span>');
}

async function runCmd(cmd) {
  if (cmdRunning) return;
  cmdRunning = true;
  switchTab('cmd');
  const btn = document.getElementById('btn-' + cmd);
  if (btn) btn.classList.add('running');
  document.getElementById('term-dot').style.color = 'var(--accent)';
  document.getElementById('term-title').textContent = `ejecutando: bago ${cmd} ...`;
  termSet(`<span class="t-cmd">$ bago ${cmd}</span>\n<span class="t-dim">ejecutando...</span>`);
  try {
    const r = await fetch('/api/run', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({cmd})
    });
    const data = await r.json();
    const out = data.output || data.error || '(sin salida)';
    termSet(`<span class="t-cmd">$ bago ${cmd}</span>\n${colorizeOutput(out)}\n`);
    document.getElementById('term-title').textContent = `bago ${cmd} — ok`;
    document.getElementById('term-dot').style.color = 'var(--ok)';
  } catch(e) {
    termSet(`<span class="t-cmd">$ bago ${cmd}</span>\n<span class="t-err">Error de conexión: ${e.message}</span>\n`);
    document.getElementById('term-dot').style.color = 'var(--err)';
    document.getElementById('term-title').textContent = 'error';
  } finally {
    cmdRunning = false;
    if (btn) btn.classList.remove('running');
  }
}

async function runCustomCmd() {
  const input = document.getElementById('cmd-input');
  const raw = input.value.trim().replace(/^bago\s+/, '');
  if (!raw) return;
  input.value = '';
  await runCmd(raw);
}

/* ── TAREAS ── */
async function loadTareas() {
  try {
    const data = await fetch('/api/tareas').then(r=>r.json());
    tareasData = data.tareas || [];
    renderTareas();
  } catch(e) {
    document.getElementById('tareas-list').innerHTML = `<div class="card"><div style="color:var(--err)">Error cargando tareas</div></div>`;
  }
}

function renderTareas() {
  const pendientes = tareasData.filter(t=>t.status==='pendiente');
  const hechas     = tareasData.filter(t=>t.status==='hecho').slice(-3);
  const el = document.getElementById('tareas-list');
  if (!tareasData.length) {
    el.innerHTML = `<div class="card"><div style="text-align:center;padding:30px;color:var(--muted)"><div style="font-size:40px;margin-bottom:12px">📋</div><div>Sin tareas</div><div style="font-size:12px;margin-top:6px">Escribe abajo para añadir</div></div></div>`;
    return;
  }
  let html = '';
  if (pendientes.length) {
    html += `<div class="card"><div class="card-title">Pendientes (${pendientes.length})</div>${pendientes.map(t=>`
      <div class="tarea-item" id="tr-${t.id}">
        <div class="tarea-check" onclick="completarTarea('${t.id}')"></div>
        <div class="tarea-body">
          <div class="tarea-titulo">${t.proyecto!=='general'?`<span class="proj-tag">${esc(t.proyecto.toUpperCase())}</span>`:''}${esc(t.titulo)}</div>
          <div class="tarea-meta">${esc(t.id)} · ${esc((t.created_at||'').slice(0,10))}</div>
        </div>
        <div class="tarea-del" onclick="borrarTarea('${t.id}')">🗑</div>
      </div>`).join('')}</div>`;
  }
  if (hechas.length) {
    html += `<div class="card"><div class="card-title">Completadas</div>${hechas.reverse().map(t=>`
      <div class="tarea-item" style="opacity:.5">
        <div class="tarea-check done">✓</div>
        <div class="tarea-body">
          <div class="tarea-titulo" style="text-decoration:line-through">${esc(t.titulo)}</div>
          <div class="tarea-meta">${esc(t.id)}</div>
        </div>
      </div>`).join('')}</div>`;
  }
  el.innerHTML = html;
}

async function addTarea() {
  const inp = document.getElementById('tarea-input');
  const txt = inp.value.trim();
  if (!txt) return;
  let titulo = txt, proyecto = 'general';
  if (txt.includes(':') && txt.indexOf(':') < 20) {
    proyecto = txt.slice(0, txt.indexOf(':')).trim().toLowerCase();
    titulo   = txt.slice(txt.indexOf(':')+1).trim();
  }
  await fetch('/api/tarea', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({titulo, proyecto})
  });
  inp.value = '';
  toast('✅ Tarea añadida');
  loadTareas();
}

async function completarTarea(id) {
  const el = document.getElementById('tr-'+id);
  if (el) el.style.opacity = '.4';
  await fetch('/api/tarea/completar', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({id})
  });
  toast('✅ Completada');
  loadTareas();
}

async function borrarTarea(id) {
  await fetch('/api/tarea/borrar', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({id})
  });
  toast('🗑 Borrada');
  loadTareas();
}

/* ── GIT ── */
async function loadGit() {
  try {
    const g = await fetch('/api/git').then(r=>r.json());
    const logLines = (g.log||'').split('\n').filter(Boolean).map(l=>{
      const sp = l.indexOf(' ');
      const hash = l.slice(0,sp); const msg = l.slice(sp+1);
      return `<div class="git-log-line"><span class="git-hash">${esc(hash)}</span><span class="git-msg">${esc(msg)}</span></div>`;
    }).join('');
    const statusLines = (g.status||'').split('\n').filter(Boolean).map(l=>{
      const code = l.slice(0,2).trim();
      const cls  = code==='M'?'git-mod':code==='A'?'git-add':code==='D'?'git-del':'';
      return `<div class="git-status-line"><span class="${cls}">${esc(l.slice(0,2))}</span><span>${esc(l.slice(3))}</span></div>`;
    }).join('');
    document.getElementById('git-content').innerHTML = `
      <div class="card"><div class="card-title">Rama activa</div><div style="font-family:monospace;font-size:15px;color:var(--accent);padding:4px 0">🌿 ${esc(g.branch||'?')}</div></div>
      ${statusLines?`<div class="card"><div class="card-title">Cambios pendientes</div>${statusLines}</div>`:`<div class="card"><div style="color:var(--ok);font-size:13px">✅ Sin cambios pendientes</div></div>`}
      <div class="card"><div class="card-title">Últimos commits</div>${logLines||'<div style="color:var(--muted)">Sin commits</div>'}</div>
      <div style="padding:4px 0"><button class="qbtn" style="width:100%" onclick="loadGit()">🔄 Refresh</button></div>`;
  } catch(e) {
    document.getElementById('git-content').innerHTML = `<div class="card"><div style="color:var(--err)">Error cargando git</div></div>`;
  }
}

/* ── Init ── */
async function init() {
  await loadTareas();
  loadDash();
}
init();
setInterval(()=>{ if(currentTab==='dash') loadDash(); }, 20000);
</script>
