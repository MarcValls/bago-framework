name: Validation purity

on:
  pull_request:
  push:
    branches: [master]

jobs:
  validation-purity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify clean tree before checks
        run: git diff --quiet || (echo "Working tree is dirty before checks"; git diff --stat; exit 1)

      - name: Run validate
        run: python3 bago validate

      - name: Run health
        run: python3 bago health

      - name: Verify no side effects
        run: git diff --quiet || (echo "validate/health introduced changes"; git diff --stat; git diff; exit 1)
