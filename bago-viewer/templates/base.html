<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}BAGO Viewer{% endblock %}</title>
  <style>
    :root {
      --bg: #0b1120;
      --panel: #111827;
      --card: #1e293b;
      --border: #1e3a5f;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #22c55e;
      --accent2: #38bdf8;
      --warn: #f59e0b;
      --danger: #ef4444;
      --line: #334155;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    a { color: var(--accent2); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Nav */
    nav {
      background: rgba(17,24,39,0.95);
      border-bottom: 1px solid var(--line);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(8px);
    }
    nav .logo {
      font-weight: 800;
      font-size: 1.05rem;
      letter-spacing: -.01em;
      color: var(--accent2);
    }
    nav .logo span { color: var(--accent); }
    nav .breadcrumb { color: var(--muted); font-size: .9rem; }

    /* Layout */
    .wrap { max-width: 1200px; margin: 0 auto; padding: 32px 20px 64px; }

    /* Typography */
    h1 { font-size: 1.9rem; font-weight: 800; line-height: 1.15; }
    h2 { font-size: 1.25rem; font-weight: 700; margin: 36px 0 14px; color: var(--accent2); }
    h3 { font-size: 1rem; font-weight: 600; margin-bottom: 8px; }
    p { line-height: 1.6; color: var(--muted); }

    /* Cards */
    .grid { display: grid; gap: 14px; }
    .cards-3 { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
    .cards-2 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
    }
    .card-title { color: var(--muted); font-size: .78rem; text-transform: uppercase; letter-spacing: .07em; }
    .card-value { font-size: 2rem; font-weight: 800; margin: 10px 0 4px; }
    .card-sub { color: var(--muted); font-size: .88rem; }

    /* Badge GO/KO */
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 999px;
      font-size: .82rem; font-weight: 700; letter-spacing: .04em;
    }
    .badge-go { background: rgba(34,197,94,.15); color: #4ade80; border: 1px solid rgba(34,197,94,.3); }
    .badge-ko { background: rgba(239,68,68,.15); color: #f87171; border: 1px solid rgba(239,68,68,.3); }
    .badge-warn { background: rgba(245,158,11,.15); color: #fbbf24; border: 1px solid rgba(245,158,11,.3); }
    .badge-unknown { background: rgba(100,116,139,.15); color: #94a3b8; border: 1px solid rgba(100,116,139,.3); }

    .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }

    /* Panel */
    .panel {
      background: rgba(17,24,39,.9);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px 24px;
      margin-top: 14px;
    }

    /* Tag */
    .tag {
      display: inline-block;
      padding: 2px 10px; border-radius: 999px;
      font-size: .78rem; font-weight: 600;
      background: rgba(56,189,248,.12);
      color: var(--accent2);
      border: 1px solid rgba(56,189,248,.2);
    }

    /* Table */
    table { width: 100%; border-collapse: collapse; font-size: .92rem; }
    th { color: var(--accent2); font-weight: 600; padding: 8px 10px; border-bottom: 1px solid var(--line); }
    td { padding: 9px 10px; border-bottom: 1px solid rgba(51,65,85,.5); color: var(--text); }
    tr:last-child td { border-bottom: none; }

    /* Progress */
    .progress-row { display: flex; align-items: center; gap: 10px; margin: 6px 0; font-size: .9rem; }
    .progress-bar { flex: 1; background: var(--line); border-radius: 999px; height: 8px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 999px; }
    .fill-done { background: var(--accent); }
    .fill-pending { background: var(--muted); }
    .sprint-label { width: 110px; color: var(--muted); font-size: .82rem; }
    .sprint-status { width: 70px; font-size: .82rem; font-weight: 600; }
    .done-text { color: var(--accent); }
    .pending-text { color: var(--muted); }

    /* Pre / code */
    pre {
      background: #050c18;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      overflow-x: auto;
      font-size: .82rem;
      line-height: 1.55;
      color: #a5f3fc;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Validator block */
    .validator-row {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 12px 0; border-bottom: 1px solid rgba(51,65,85,.4);
    }
    .validator-row:last-child { border-bottom: none; }
    .validator-name { font-size: .9rem; font-weight: 600; min-width: 160px; }

    /* Button */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 10px;
      font-size: .9rem; font-weight: 600; cursor: pointer;
      border: none; text-decoration: none;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; text-decoration: none; }
    .btn-primary { background: var(--accent2); color: #0b1120; }
    .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--line); }
    .btn-go { background: rgba(34,197,94,.2); color: #4ade80; border: 1px solid rgba(34,197,94,.3); }

    /* Section divider */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin: 36px 0 14px;
    }

    /* Pack card (index) */
    .pack-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 22px;
      transition: border-color .2s, transform .2s;
      cursor: pointer;
    }
    .pack-card:hover { border-color: var(--accent2); transform: translateY(-2px); }
    .pack-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .pack-name { font-size: 1.1rem; font-weight: 700; }
    .pack-meta { color: var(--muted); font-size: .83rem; margin: 6px 0 12px; line-height: 1.5; }
    .pack-footer { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }

    /* Diff indicator */
    .diff-ok { color: var(--accent); font-weight: 600; }
    .diff-warn { color: var(--warn); font-weight: 600; }

    /* Responsive */
    @media (max-width: 640px) {
      h1 { font-size: 1.4rem; }
      .cards-3 { grid-template-columns: 1fr 1fr; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
</head>
<body>
<nav>
  <a href="/" style="text-decoration:none;"><div class="logo">BAGO<span>·</span>Viewer</div></a>
  <span class="breadcrumb">{% block breadcrumb %}Inicio{% endblock %}</span>
  <a href="/packs" style="margin-left:auto;font-size:.85rem;color:#94a3b8;font-weight:600;">📦 Packs</a>
  <a href="/evolution" style="font-size:.85rem;color:var(--accent);font-weight:600;">📈 Evolución</a>
  <a href="/metrics" style="font-size:.85rem;color:var(--accent2);font-weight:600;">📊 Métricas</a>
  <a href="/orchestrator" style="font-size:.85rem;color:#c084fc;font-weight:600;">🎛 Orquestador</a>
</nav>
<div class="wrap">
  {% block content %}{% endblock %}
</div>
</body>
</html>
