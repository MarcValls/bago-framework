name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run BAGO integration tests
        run: python3 .bago/tools/integration_tests.py
      - name: Run BAGO health score
        run: python3 .bago/tools/health_score.py || true
      - name: Run BAGO validate pack
        run: python3 .bago/tools/validate_pack.py || true
